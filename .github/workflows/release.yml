name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Step 1: Create a draft GitHub release with tag and release notes
  create-release:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'autorelease: pending')
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./action
        id: release
        with:
          command: release

  # Step 2: Build CLI binary and upload to the draft release
  build-artifacts:
    needs: create-release
    if: needs.create-release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Prepare artifact
        run: |
          cp target/release/rustlease-please rustlease-please-linux-x64
          chmod +x rustlease-please-linux-x64

      - name: Upload binary to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag_name }}" \
            rustlease-please-linux-x64 \
            --clobber

  # Step 3: Take the release out of draft
  publish-release:
    needs: [create-release, build-artifacts]
    if: needs.create-release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release edit "${{ needs.create-release.outputs.tag_name }}" --draft=false
          echo "Published release ${{ needs.create-release.outputs.tag_name }}"

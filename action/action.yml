name: 'Synthase'
description: 'Automated release management — create release PRs and GitHub releases from conventional commits'
author: 'synthase'

branding:
  icon: 'package'
  color: 'orange'

inputs:
  token:
    description: 'GitHub token for API access. Needs contents:write and pull-requests:write permissions.'
    required: false
    default: ${{ github.token }}
  command:
    description: |
      Command to run:
        "release" (default) — create draft releases for merged PRs, then create/update release PRs
        "release-pr" — only create/update release PRs
        "create-releases" — only create draft releases from merged PRs
        "publish" — take draft releases out of draft (use with tag-name input)
    required: false
    default: 'release'
  target-branch:
    description: 'Branch to target for releases. Defaults to the repository default branch.'
    required: false
    default: ${{ github.event.repository.default_branch }}
  tag-name:
    description: 'Tag name for the publish command. If not specified, publishes all draft releases.'
    required: false
    default: ''
  config-file:
    description: 'Path to synthase-config.json.'
    required: false
    default: 'synthase-config.json'
  manifest-file:
    description: 'Path to .synthase-manifest.json.'
    required: false
    default: '.synthase-manifest.json'
  cli-version:
    description: 'Version of synthase CLI to use. Set to "build" to build from source.'
    required: false
    default: '0.8.6' # x-synthase-version

outputs:
  releases_created:
    description: 'Whether any releases were created (true/false).'
    value: ${{ steps.run-command.outputs.releases_created }}
  release_created:
    description: 'Whether a release was created for the root component (true/false).'
    value: ${{ steps.run-command.outputs.release_created }}
  prs_created:
    description: 'Whether any release PRs were created or updated (true/false).'
    value: ${{ steps.run-command.outputs.prs_created }}
  releases:
    description: 'JSON array of release objects with version, tag, component info.'
    value: ${{ steps.run-command.outputs.releases }}
  paths_released:
    description: 'JSON array of paths that had releases created.'
    value: ${{ steps.run-command.outputs.paths_released }}
  pr_number:
    description: 'The release PR number, if one was created or updated.'
    value: ${{ steps.run-command.outputs.pr_number }}
  tag_name:
    description: 'Tag name of the first release (for single-package repos).'
    value: ${{ steps.run-command.outputs.tag_name }}
  version:
    description: 'Version of the first release (for single-package repos).'
    value: ${{ steps.run-command.outputs.version }}
  major:
    description: 'Major version component of the first release.'
    value: ${{ steps.run-command.outputs.major }}
  minor:
    description: 'Minor version component of the first release.'
    value: ${{ steps.run-command.outputs.minor }}
  patch:
    description: 'Patch version component of the first release.'
    value: ${{ steps.run-command.outputs.patch }}
  upload_url:
    description: 'Upload URL for the first release.'
    value: ${{ steps.run-command.outputs.upload_url }}
  html_url:
    description: 'HTML URL for the first release.'
    value: ${{ steps.run-command.outputs.html_url }}

runs:
  using: 'composite'
  steps:
    - name: Install synthase CLI (from release)
      if: inputs.cli-version != 'build' && (inputs.command == 'release' || inputs.command == 'release-pr')
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        VERSION="${{ inputs.cli-version }}"
        REPO="kinyoklion/synthase"
        TAG="synthase-v${VERSION}"

        echo "Downloading synthase ${VERSION} from ${REPO}..."
        gh release download "$TAG" \
          --repo "$REPO" \
          --pattern "synthase-linux-x64" \
          --dir "${{ runner.temp }}"

        chmod +x "${{ runner.temp }}/synthase-linux-x64"
        mv "${{ runner.temp }}/synthase-linux-x64" "${{ runner.temp }}/synthase"
        echo "SYNTHASE_BIN=${{ runner.temp }}/synthase" >> "$GITHUB_ENV"
        echo "Installed synthase ${VERSION}"

    - name: Build synthase CLI (from source)
      if: inputs.cli-version == 'build' && (inputs.command == 'release' || inputs.command == 'release-pr')
      shell: bash
      run: |
        rustup toolchain install stable --profile minimal
        cd "${{ github.action_path }}/.."
        cargo build --release
        echo "SYNTHASE_BIN=${{ github.action_path }}/../target/release/synthase" >> "$GITHUB_ENV"

    - name: Run synthase
      id: run-command
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        GITHUB_TOKEN: ${{ inputs.token }}
        TARGET_BRANCH: ${{ inputs.target-branch }}
        COMMAND: ${{ inputs.command }}
        TAG_NAME: ${{ inputs.tag-name }}
        CONFIG_FILE: ${{ inputs.config-file }}
        MANIFEST_FILE: ${{ inputs.manifest-file }}
      run: |
        case "$COMMAND" in
          release)
            # Phase 1: Create draft releases for merged PRs
            bash "${{ github.action_path }}/scripts/create-releases.sh"
            # Phase 2: Create/update release PRs (if Phase 1 didn't just tag something)
            bash "${{ github.action_path }}/scripts/release-pr.sh"
            ;;
          release-pr)
            bash "${{ github.action_path }}/scripts/release-pr.sh"
            ;;
          create-releases)
            bash "${{ github.action_path }}/scripts/create-releases.sh"
            ;;
          publish)
            bash "${{ github.action_path }}/scripts/publish.sh"
            ;;
          *)
            echo "::error::Unknown command: $COMMAND. Use 'release', 'release-pr', 'create-releases', or 'publish'."
            exit 1
            ;;
        esac
